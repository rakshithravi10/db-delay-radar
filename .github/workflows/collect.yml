name: collect-delays
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests python-dotenv
      - name: Run poller
        env:
          DB_CLIENT_ID: ${{ secrets.DB_CLIENT_ID }}
          DB_API_KEY: ${{ secrets.DB_API_KEY }}
        run: python scripts/ingest.py --once
      - name: Commit database
        run: |
          git config user.name "delay-bot"
          git config user.email "bot@users.noreply.github.com"
          git add scripts/delays.sqlite
          git commit -m "data: $(date -u +%F_%H:%M)" || echo "no changes"
          git pull --rebase
          git push
